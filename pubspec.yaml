name: finwise_ai
description: AI-Powered Personal Finance Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  google_sign_in: ^6.2.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  dio: ^5.4.3+1
  go_router: ^14.1.1
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^17.1.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  pdf: ^3.10.8
  printing: ^5.12.0
  csv: ^6.0.0
  share_plus: ^12.0.2

  intl: ^0.19.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  local_auth: ^2.2.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  equatable: ^2.0.5
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  path_provider: ^2.1.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
